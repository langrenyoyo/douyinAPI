services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: douyinapi-backend
    env_file:
      - .env
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: douyinapi-frontend
    depends_on:
      - backend
    ports:
      - "8010:8010"
    restart: unless-stopped
