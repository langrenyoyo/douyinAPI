server {
    listen 8010;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /health {
        proxy_pass http://backend:8081;
    }

    location /dashboard {
        proxy_pass http://backend:8081;
    }

    location /leads {
        proxy_pass http://backend:8081;
    }

    location /conversations {
        proxy_pass http://backend:8081;
    }

    location /quick-replies {
        proxy_pass http://backend:8081;
    }

    location /events {
        proxy_pass http://backend:8081;
    }

    location /api-call-logs {
        proxy_pass http://backend:8081;
    }

    location /auth-callback-records {
        proxy_pass http://backend:8081;
    }

    location /auth-token-records {
        proxy_pass http://backend:8081;
    }

    location /auth-status {
        proxy_pass http://backend:8081;
    }

    location /douyin {
        proxy_pass http://backend:8081;
    }

    location /aigc {
        proxy_pass http://backend:8081;
    }
}
